name: Build iOS IPA (App Store)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: datereunion

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: datereunion/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ]; then npx cap add ios; fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          KS=$RUNNER_TEMP/signing.keychain-db
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERT
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KS
          security set-keychain-settings -lut 21600 $KS
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KS
          security import $CERT -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KS
          security list-keychain -d user -s $KS

      - name: Import provisioning profile
        env:
          PP_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP=$RUNNER_TEMP/pp.mobileprovision
          echo -n "$PP_BASE64" | base64 --decode -o $PP
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Archive
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive | xcpretty

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>TEAM_ID_HERE</string>
          </dict></plist>
          EOF
          sed -i "s/TEAM_ID_HERE/${{ secrets.APPLE_TEAM_ID }}/" $RUNNER_TEMP/ExportOptions.plist
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export | xcpretty

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DateReunion-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/export/App.ipa
          retention-days: 30

